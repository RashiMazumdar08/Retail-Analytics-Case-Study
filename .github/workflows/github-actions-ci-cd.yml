# ============================================
# GitHub Actions CI/CD Pipeline
# Place this file at: .github/workflows/ci-cd.yml in your repo
# Runs automatically on every push to main
# ============================================
name: Spark App CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Simple test - check the script compiles
      - name: Test
        run: python -m py_compile app.py

      # 4. Login to Docker Hub (add secrets in repo Settings > Secrets)
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build and push the Docker image
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/retail-analytics:latest
